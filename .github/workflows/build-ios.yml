name: Build iOS IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: flutter_app/ios/Pods
          key: pods-${{ hashFiles('flutter_app/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r FritzTools.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: FritzTools.ipa
          path: flutter_app/FritzTools.ipa
          archive: false
          retention-days: 90

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: flutter_app/FritzTools.ipa
          generate_release_notes: true

      - name: Trigger app-source update
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_PAT }}" \
            https://api.github.com/repos/oct-obus/app-source/dispatches \
            -d '{"event_type":"update-source"}'
