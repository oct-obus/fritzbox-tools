name: Build iOS IPA

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: flutter_app/ios/Pods
          key: pods-${{ hashFiles('flutter_app/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install dependencies
        run: flutter pub get

      - name: Disable code signing
        run: |
          echo 'CODE_SIGNING_ALLOWED=NO' >> ios/Flutter/Release.xcconfig
          echo 'CODE_SIGNING_REQUIRED=NO' >> ios/Flutter/Release.xcconfig
          echo 'CODE_SIGN_IDENTITY=' >> ios/Flutter/Release.xcconfig

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign 2>&1 || true

          RUNNER_APP=""
          for app in $(find build -name "Runner.app" -type d 2>/dev/null); do
            if [ -f "$app/Runner" ]; then
              RUNNER_APP="$app"
              break
            fi
          done

          if [ -z "$RUNNER_APP" ]; then
            echo "❌ No Runner.app with binary found"
            find build -name "Runner.app" -type d 2>/dev/null
            exit 1
          fi

          echo "✅ Found Runner.app at: $RUNNER_APP"
          ls -la "$RUNNER_APP/"

          mkdir -p build/ios/iphoneos
          if [ "$RUNNER_APP" != "build/ios/iphoneos/Runner.app" ]; then
            ditto "$RUNNER_APP" build/ios/iphoneos/Runner.app
          fi

      - name: Verify IPA contents
        run: |
          APP=build/ios/iphoneos/Runner.app
          ls -la "$APP/Runner" || { echo "FATAL: No Runner binary!"; exit 1; }
          ls -la "$APP/Assets.car" || { echo "FATAL: No Assets.car (no icons)!"; exit 1; }
          ls -la "$APP/Info.plist" || { echo "FATAL: No Info.plist!"; exit 1; }
          echo "✅ Bundle looks good"
          du -sh "$APP"

      - name: Package IPA
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r -9 --symlinks FritzTools.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FritzTools-unsigned
          path: flutter_app/build/ios/iphoneos/FritzTools.ipa

      - name: Upload IPA to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: flutter_app/build/ios/iphoneos/FritzTools.ipa

      - name: Trigger app-source update
        if: github.event_name == 'release'
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_PAT }}" \
            https://api.github.com/repos/oct-obus/app-source/dispatches \
            -d '{"event_type":"update-source"}'
