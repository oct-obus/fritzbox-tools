<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fritz!Box Tools</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --orange: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .container { max-width: 960px; margin: 0 auto; padding: 16px 12px; }
  h1 { font-size: 20px; margin-bottom: 2px; }
  .subtitle { color: var(--text-dim); font-size: 12px; margin-bottom: 16px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .card h2 { font-size: 14px; margin-bottom: 8px; }
  label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 16px;
    margin-bottom: 8px;
    -webkit-appearance: none;
  }
  input:focus { outline: none; border-color: var(--accent); }
  .row { display: flex; gap: 8px; }
  .row > div { flex: 1; }
  button {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    -webkit-appearance: none;
    touch-action: manipulation;
  }
  button:active { opacity: 0.7; }
  button.primary { background: #238636; border-color: rgba(240,246,252,0.1); color: #fff; }
  button.danger { background: #da3633; border-color: rgba(240,246,252,0.1); color: #fff; }
  button:disabled { opacity: 0.4; }
  .status { font-size: 11px; margin-top: 4px; word-break: break-all; }
  .status.ok { color: var(--green); }
  .status.err { color: var(--red); }
  .status.warn { color: var(--orange); }
  .device-list { margin-top: 8px; }
  .device-item {
    display: flex;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .device-item:last-child { border-bottom: none; }
  .device-info { flex: 1; min-width: 0; }
  .device-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .device-detail { font-size: 11px; color: var(--text-dim); font-family: monospace; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot.on { background: var(--green); }
  .dot.off { background: var(--text-dim); }
  .tag {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .tag.mesh { background: rgba(88,166,255,0.15); color: var(--accent); }
  .tag.type { background: rgba(139,148,158,0.1); color: var(--text-dim); }
  .tag.repeater { background: rgba(210,153,34,0.15); color: var(--orange); }
  .tag.not-meshed { background: rgba(248,81,73,0.15); color: var(--red); }
  .uplink-info { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
  .uplink-info .via { color: var(--accent); }
  .filter-btn {
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: transparent;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
  }
  .filter-btn.active { background: rgba(210,153,34,0.15); color: var(--orange); border-color: var(--orange); }
  .empty { text-align: center; padding: 20px; color: var(--text-dim); font-size: 12px; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .count { font-size: 11px; color: var(--text-dim); }
  .log {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    font-family: monospace;
    font-size: 11px;
    max-height: 160px;
    overflow-y: auto;
    white-space: pre-wrap;
    color: var(--text-dim);
    margin-top: 8px;
    display: none;
    -webkit-overflow-scrolling: touch;
  }
  .tree-node { margin-left: 0; }
  .tree-children { margin-left: 20px; border-left: 1px solid var(--border); padding-left: 12px; }
  .tree-item {
    padding: 6px 0;
    border-bottom: 1px solid rgba(48,54,61,0.4);
  }
  .tree-item:last-child { border-bottom: none; }
  .tree-header { display: flex; align-items: center; gap: 8px; }
  .tree-name { font-size: 13px; font-weight: 500; }
  .tree-detail { font-size: 11px; color: var(--text-dim); font-family: monospace; margin-top: 1px; }
  .tree-link-type { font-size: 10px; color: var(--text-dim); }
  .tree-link-type .speed { color: var(--green); }
  .tree-icon { font-size: 14px; flex-shrink: 0; }
  .tree-clients-summary { font-size: 10px; color: var(--text-dim); margin-top: 2px; cursor: pointer; }
  .tree-clients-summary:hover { color: var(--accent); }
  .tree-clients { display: none; margin-left: 8px; margin-top: 4px; }
  .tree-clients.expanded { display: block; }
  .tree-client-item { font-size: 11px; color: var(--text-dim); padding: 1px 0; display: flex; align-items: center; gap: 6px; }
  .tabs { display: flex; gap: 0; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  @media (max-width: 600px) { .row { flex-direction: column; gap: 0; } }
</style>
</head>
<body>
<div class="container">
  <h1>Fritz!Box Tools</h1>
  <p class="subtitle">Device list and mesh pairing</p>

  <div class="card" id="login-card">
    <h2>Connect</h2>
    <div class="row">
      <div>
        <label>Host</label>
        <input type="text" id="host" value="fritz.box">
      </div>
      <div>
        <label>Username</label>
        <input type="text" id="username" value="" placeholder="(optional)">
      </div>
    </div>
    <label>Password</label>
    <input type="password" id="password" placeholder="Fritz!Box password">
    <label style="display:flex; align-items:center; gap:6px; margin-bottom:8px; cursor:pointer;">
      <input type="checkbox" id="remember" style="width:auto; margin:0;" onchange="toggleRemember()">
      <span>Remember credentials</span>
    </label>
    <button class="primary" id="btn-login" onclick="doLogin()">Connect</button>
    <button id="btn-logout" onclick="doLogout()" style="display:none; margin-left: 6px;">Disconnect</button>
    <div class="status" id="login-status"></div>
  </div>

  <div class="tabs" id="tabs" style="display:none;">
    <div class="tab active" data-tab="devices" onclick="switchTab('devices')">Devices</div>
    <div class="tab" data-tab="tree" onclick="switchTab('tree')">Tree</div>
    <div class="tab" data-tab="mesh" onclick="switchTab('mesh')">Mesh</div>
  </div>

  <div class="card" id="devices-card" style="display:none;">
    <div class="flex-between">
      <h2>LAN Devices <span class="count" id="device-count"></span></h2>
      <div style="display:flex; gap:6px; align-items:center;">
        <button class="filter-btn" id="btn-filter-repeaters" onclick="toggleRepeaterFilter()">📡 Repeaters</button>
        <button onclick="loadDevices()">Refresh</button>
      </div>
    </div>
    <div class="device-list" id="devices-content">
      <div class="empty">Loading...</div>
    </div>
  </div>

  <div class="card" id="tree-card" style="display:none;">
    <div class="flex-between">
      <h2>Mesh Topology</h2>
      <button onclick="loadDevices()">Refresh</button>
    </div>
    <div id="tree-content">
      <div class="empty">Loading...</div>
    </div>
  </div>

  <div class="card" id="mesh-card" style="display:none;">
    <h2>Mesh Pairing</h2>
    <p style="font-size: 11px; color: var(--text-dim); margin-bottom: 8px;">
      Start mesh coupling on the Fritz!Box. Optionally trigger WPS on a repeater.
    </p>
    <div class="row">
      <div>
        <label>Repeater IP</label>
        <input type="text" id="repeater-ip" placeholder="192.168.178.2">
      </div>
      <div>
        <label>Repeater Password</label>
        <input type="password" id="repeater-pw" placeholder="(uses main if empty)">
      </div>
    </div>
    <button class="primary" id="btn-mesh" onclick="startMesh()">Start Mesh Coupling</button>
    <button id="btn-mesh-stop" onclick="stopPoll()" style="display:none; margin-left: 6px;">Stop</button>
    <div class="status" id="mesh-status"></div>
    <div class="log" id="mesh-log"></div>
  </div>
</div>

<script>
const PROXY_BASE = window.location.origin;

let currentSid = null;
let currentHost = null;
let polling = false;
let pollTimer = null;
let initialPeers = new Set();
let meshData = null;
let allDevices = [];
let showRepeatersOnly = false;

function loadSaved() {
  try {
    const saved = localStorage.getItem('fritz_creds');
    if (saved) {
      const c = JSON.parse(saved);
      document.getElementById('host').value = c.host || 'fritz.box';
      document.getElementById('username').value = c.username || '';
      document.getElementById('password').value = c.password || '';
      document.getElementById('remember').checked = true;
    }
  } catch (e) {}
}

function saveCredentials() {
  if (document.getElementById('remember').checked) {
    localStorage.setItem('fritz_creds', JSON.stringify({
      host: document.getElementById('host').value.trim(),
      username: document.getElementById('username').value.trim(),
      password: document.getElementById('password').value,
    }));
  }
}

function clearCredentials() {
  localStorage.removeItem('fritz_creds');
  document.getElementById('remember').checked = false;
}

function toggleRemember() {
  if (!document.getElementById('remember').checked) {
    clearCredentials();
  }
}

loadSaved();

function proxyUrl(host, path) {
  return PROXY_BASE + '/proxy/' + encodeURIComponent(host) + path;
}

async function fritzFetch(url, opts = {}) {
  const resp = await fetch(url, opts);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  return resp;
}

async function doLogin() {
  const host = document.getElementById('host').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!host || !password) { setStatus('login-status', 'Host and password required.', 'err'); return; }

  document.getElementById('btn-login').disabled = true;
  setStatus('login-status', 'Connecting...', 'warn');

  try {
    const loginUrl = proxyUrl(host, '/login');
    const resp = await fritzFetch(loginUrl, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password}),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    currentSid = data.sid;
    currentHost = host;
    saveCredentials();
    setStatus('login-status', 'Connected. SID: ' + currentSid, 'ok');
    document.getElementById('btn-logout').style.display = 'inline-block';
    document.getElementById('tabs').style.display = 'flex';
    document.getElementById('devices-card').style.display = 'block';
    loadDevices();
  } catch (e) {
    setStatus('login-status', 'Failed: ' + e.message, 'err');
  } finally {
    document.getElementById('btn-login').disabled = false;
  }
}

function doLogout() {
  currentSid = null;
  currentHost = null;
  meshData = null;
  allDevices = [];
  rawLandeviceData = null;
  stopPoll();
  setStatus('login-status', 'Disconnected.', '');
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('tabs').style.display = 'none';
  document.getElementById('devices-card').style.display = 'none';
  document.getElementById('tree-card').style.display = 'none';
  document.getElementById('mesh-card').style.display = 'none';
  document.getElementById('devices-content').innerHTML = '<div class="empty">Loading...</div>';
  document.getElementById('device-count').textContent = '';
}

// --- Mesh topology ---
async function loadMeshTopology() {
  if (!currentSid || !currentHost) return null;
  try {
    const url = proxyUrl(currentHost, '/data/mesh?sid=' + currentSid);
    const resp = await fritzFetch(url);
    return await resp.json();
  } catch (e) {
    console.log('Mesh topology load failed:', e);
    return null;
  }
}

function parseMeshNodes(mesh) {
  if (!mesh || !mesh.data || !mesh.data.nodes) return {};
  const nodes = {};
  for (const node of mesh.data.nodes) {
    nodes[node.uid] = {
      uid: node.uid,
      name: node.name || '',
      meshRole: node.mesh_type || '',  // master, slave, ...
      isMaster: node.mesh_type === 'master',
      model: node.model || '',
      isMeshed: node.is_meshed === true || node.is_meshed === '1',
      interfaces: node.node_interfaces || [],
    };
  }
  return nodes;
}

function findUplinkFromMesh(meshNodes, deviceMeshUid) {
  const node = meshNodes[deviceMeshUid];
  if (!node || !node.interfaces) return null;
  for (const iface of node.interfaces) {
    if (iface.type === 'WLAN' || iface.type === 'LAN') {
      const links = iface.node_links || [];
      for (const link of links) {
        if (link.type === 'UPLINK' || link.node_interface_type === 'UPLINK') {
          const targetUid = link.node_uid;
          const target = meshNodes[targetUid];
          if (target) return target.name || ('UID ' + targetUid);
        }
      }
    }
  }
  return null;
}

// --- Device list ---
async function loadDevices() {
  if (!currentSid || !currentHost) return;
  const el = document.getElementById('devices-content');
  el.innerHTML = '<div class="empty">Loading...</div>';

  try {
    const [devResp, mesh] = await Promise.all([
      fritzFetch(proxyUrl(currentHost, '/api/landevice?sid=' + currentSid)),
      loadMeshTopology(),
    ]);
    const data = await devResp.json();
    rawLandeviceData = data;
    meshData = mesh;
    const meshNodes = parseMeshNodes(mesh);
    allDevices = parseDeviceList(data, meshNodes);
    renderFilteredDevices();
    // Also re-render tree if visible
    if (document.getElementById('tree-card').style.display !== 'none') renderTree();
  } catch (e) {
    el.innerHTML = '<div class="empty">Failed: ' + esc(e.message) + '</div>';
  }
}

function parseDeviceList(data, meshNodes) {
  let list = data.landevice || data.devices || data;
  if (list && typeof list === 'object' && !Array.isArray(list)) list = list.device || [];
  if (Array.isArray(list) && list.length && list[0] && list[0].device) list = list[0].device;
  if (!Array.isArray(list)) return [];

  // Build a map of mesh_uid -> device for cross-referencing
  const meshUidToDevice = {};
  for (const d of list) {
    if (d.mesh_UIDs) meshUidToDevice[d.mesh_UIDs] = d;
  }

  return list.filter(d => typeof d === 'object').map(d => {
    const meshUid = d.mesh_UIDs || '';
    const meshNode = meshUid ? meshNodes[meshUid] : null;
    const modelname = d.modelname || '';
    const hasApInterfaces = hasAccessPointLinks(d);
    const hasUplinkLinks = hasUplink(d);

    // Determine if this is a repeater
    const isRepeater = !!(
      modelname.toLowerCase().includes('repeater') ||
      modelname.toLowerCase().includes('fritz!repeater') ||
      (meshNode && meshNode.meshRole === 'slave') ||
      hasApInterfaces
    );

    // Determine mesh status
    const isMeshed = !!(meshUid && (
      (meshNode && meshNode.isMeshed) ||
      d.nexuspeer_UID ||
      hasUplinkLinks
    ));

    // Find uplink device name
    let uplinkName = null;
    if (isRepeater) {
      // First try mesh topology data
      if (meshNode) uplinkName = findUplinkFromMesh(meshNodes, meshUid);
      // Fallback: parse link_list for uplink entries
      if (!uplinkName) uplinkName = findUplinkFromLinkList(d, meshUidToDevice);
    }

    return {
      name: d.friendly_name || d.name || d.hostname || '',
      ip: d.ip || d.ipv4 || '',
      mac: d.mac || '',
      online: d.active === '1' || d.active === true || d.online === '1',
      type: d.type || d.devtype || '',
      isRepeater,
      isMeshed,
      meshRole: meshNode ? meshNode.meshRole : '',
      modelname,
      uplinkName,
      uid: d.UID || '',
    };
  });
}

function hasAccessPointLinks(d) {
  const linkList = d.link_list;
  if (!Array.isArray(linkList) || !linkList.length) return false;
  const entries = linkList[0]?.entry || [];
  return entries.some(e =>
    e.is_uplink === '0' &&
    (e.local_interface_name || '').startsWith('AP:')
  );
}

function hasUplink(d) {
  const linkList = d.link_list;
  if (!Array.isArray(linkList) || !linkList.length) return false;
  const entries = linkList[0]?.entry || [];
  return entries.some(e => e.is_uplink === '1');
}

function findUplinkFromLinkList(d, meshUidToDevice) {
  const linkList = d.link_list;
  if (!Array.isArray(linkList) || !linkList.length) return null;
  const entries = linkList[0]?.entry || [];
  for (const entry of entries) {
    if (entry.is_uplink === '1' && entry.remote_dev_mesh_uid) {
      const remoteDev = meshUidToDevice[entry.remote_dev_mesh_uid];
      if (remoteDev) {
        return remoteDev.friendly_name || remoteDev.name || ('IP ' + remoteDev.ip);
      }
      // mesh_uid "1" typically means the main Fritz!Box
      if (entry.remote_dev_mesh_uid === '1') return 'Fritz!Box (master)';
      return 'Mesh node ' + entry.remote_dev_mesh_uid;
    }
  }
  return null;
}

function checkIsMeshed(d) {
  const meshUid = d.mesh_UIDs || '';
  return !!(meshUid && (d.nexuspeer_UID || hasUplink(d)));
}

function toggleRepeaterFilter() {
  showRepeatersOnly = !showRepeatersOnly;
  document.getElementById('btn-filter-repeaters').classList.toggle('active', showRepeatersOnly);
  renderFilteredDevices();
}

function renderFilteredDevices() {
  let devices = allDevices;
  if (showRepeatersOnly) {
    devices = devices.filter(d => d.isRepeater);
  }
  renderDevices(devices);
}

function renderDevices(devices) {
  const el = document.getElementById('devices-content');
  const repeaterCount = allDevices.filter(d => d.isRepeater).length;
  const countText = showRepeatersOnly
    ? '(' + devices.length + ' repeater' + (devices.length !== 1 ? 's' : '') + ')'
    : '(' + allDevices.length + (repeaterCount ? ', ' + repeaterCount + ' repeater' + (repeaterCount !== 1 ? 's' : '') : '') + ')';
  document.getElementById('device-count').textContent = countText;

  if (!devices.length) {
    el.innerHTML = '<div class="empty">' + (showRepeatersOnly ? 'No repeaters found.' : 'No devices found.') + '</div>';
    return;
  }

  devices.sort((a, b) => {
    // Repeaters first when filtering is off, then online first, then alpha
    if (!showRepeatersOnly) {
      if (a.isRepeater !== b.isRepeater) return a.isRepeater ? -1 : 1;
    }
    if (a.online !== b.online) return a.online ? -1 : 1;
    return (a.name || '').localeCompare(b.name || '');
  });

  el.innerHTML = devices.map(d => {
    const dot = d.online ? '<div class="dot on"></div>' : '<div class="dot off"></div>';
    let tags = '';
    if (d.isRepeater) {
      tags += d.isMeshed
        ? ' <span class="tag mesh">meshed</span>'
        : ' <span class="tag not-meshed">not meshed</span>';
      if (d.modelname) tags += ' <span class="tag type">' + esc(d.modelname) + '</span>';
      else tags += ' <span class="tag repeater">repeater</span>';
    }
    const detail = esc(d.ip || '-') + ' &middot; ' + esc(d.mac || '-');
    let uplink = '';
    if (d.isRepeater && d.uplinkName) {
      uplink = '<div class="uplink-info">↑ via <span class="via">' + esc(d.uplinkName) + '</span></div>';
    } else if (d.isRepeater && !d.isMeshed) {
      uplink = '<div class="uplink-info" style="color:var(--red);">⚠ not paired</div>';
    }
    return '<div class="device-item">' + dot +
      '<div class="device-info"><div class="device-name">' + esc(d.name || '(unknown)') + '</div>' +
      '<div class="device-detail">' + detail + '</div>' + uplink + '</div>' +
      tags + '</div>';
  }).join('');
}

async function startMesh() {
  if (!currentSid || !currentHost) { setStatus('mesh-status', 'Not connected.', 'err'); return; }
  document.getElementById('btn-mesh').disabled = true;
  document.getElementById('mesh-log').textContent = '';
  document.getElementById('mesh-log').style.display = 'block';
  setStatus('mesh-status', 'Starting...', 'warn');
  appendLog('[' + time() + '] Starting mesh coupling...');

  try {
    const url = proxyUrl(currentHost, '/mesh/start');
    const repeaterIp = document.getElementById('repeater-ip').value.trim();
    const repeaterPw = document.getElementById('repeater-pw').value;
    const resp = await fritzFetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sid: currentSid, repeater_ip: repeaterIp || null, repeater_password: repeaterPw || null}),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    appendLog('[' + time() + '] ' + (data.message || 'Started.'));
    if (data.wps_message) appendLog('[' + time() + '] ' + data.wps_message);
    initialPeers = new Set(data.initial_peers || []);
    polling = true;
    document.getElementById('btn-mesh-stop').style.display = 'inline-block';
    setStatus('mesh-status', 'Waiting for new peer...', 'warn');
    pollMesh();
  } catch (e) {
    setStatus('mesh-status', 'Failed: ' + e.message, 'err');
    appendLog('Error: ' + e.message);
    document.getElementById('btn-mesh').disabled = false;
  }
}

async function pollMesh() {
  if (!polling) return;
  try {
    const url = proxyUrl(currentHost, '/mesh/poll?sid=' + currentSid);
    const resp = await fritzFetch(url);
    const data = await resp.json();
    const newPeers = (data.new_peers || []).filter(p => !initialPeers.has(p));
    if (newPeers.length) {
      appendLog('[' + time() + '] New peer(s): ' + newPeers.join(', '));
      setStatus('mesh-status', 'Pairing successful!', 'ok');
      stopPoll(); loadDevices(); return;
    }
    appendLog('[' + time() + '] Waiting... (' + (data.peer_count || 0) + ' peers)');
  } catch (e) {
    appendLog('[' + time() + '] Poll error: ' + e.message);
  }
  if (polling) pollTimer = setTimeout(pollMesh, 5000);
}

function stopPoll() {
  polling = false;
  if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
  document.getElementById('btn-mesh').disabled = false;
  document.getElementById('btn-mesh-stop').style.display = 'none';
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.getElementById('devices-card').style.display = name === 'devices' ? 'block' : 'none';
  document.getElementById('tree-card').style.display = name === 'tree' ? 'block' : 'none';
  document.getElementById('mesh-card').style.display = name === 'mesh' ? 'block' : 'none';
  if (name === 'tree') renderTree();
}

function setStatus(id, msg, cls) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status ' + (cls || '');
}

function appendLog(msg) {
  const el = document.getElementById('mesh-log');
  el.style.display = 'block';
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function time() { return new Date().toLocaleTimeString(); }

// --- Tree view ---
let rawLandeviceData = null;

function renderTree() {
  const el = document.getElementById('tree-content');
  if (!rawLandeviceData || !allDevices.length) {
    el.innerHTML = '<div class="empty">No data loaded. Go to Devices tab first.</div>';
    return;
  }

  let list = rawLandeviceData.landevice || rawLandeviceData.devices || rawLandeviceData;
  if (list && typeof list === 'object' && !Array.isArray(list)) list = list.device || [];
  if (Array.isArray(list) && list.length && list[0] && list[0].device) list = list[0].device;
  if (!Array.isArray(list)) { el.innerHTML = '<div class="empty">Could not parse device data.</div>'; return; }

  // Build device lookup by UID and mesh_UID
  const byUid = {};
  const byMeshUid = {};
  for (const d of list) {
    if (d.UID) byUid[d.UID] = d;
    if (d.mesh_UIDs) byMeshUid[d.mesh_UIDs] = d;
  }

  // Find the master device (Fritz!Box itself) — the "ownentry" flagged device
  let master = list.find(d => (d.flags || '').includes('ownentry'));
  if (!master) master = list.find(d => d.mesh_UIDs === '1');

  // Build tree: master -> repeaters -> their clients
  // A repeater is a device that has AP interfaces (serves clients) and has uplink
  const repeaters = list.filter(d => {
    if (d === master) return false;
    const linkList = d.link_list;
    if (!Array.isArray(linkList) || !linkList.length) return false;
    const entries = linkList[0]?.entry || [];
    return entries.some(e => e.is_uplink === '0' && (e.local_interface_name || '').startsWith('AP:'));
  });

  // Map children to their parent (parentuid)
  const childrenOf = {};
  for (const d of list) {
    if (d.parentuid) {
      if (!childrenOf[d.parentuid]) childrenOf[d.parentuid] = [];
      childrenOf[d.parentuid].push(d);
    }
  }

  // For each device, find which mesh node it connects to via uplink
  function getUplinkInfo(d) {
    const linkList = d.link_list;
    if (!Array.isArray(linkList) || !linkList.length) return null;
    const entries = linkList[0]?.entry || [];
    for (const e of entries) {
      if (e.is_uplink === '1') {
        const remoteDev = byMeshUid[e.remote_dev_mesh_uid];
        return {
          name: remoteDev ? (remoteDev.friendly_name || remoteDev.name) : (e.remote_dev_mesh_uid === '1' ? 'Fritz!Box' : 'Node ' + e.remote_dev_mesh_uid),
          mediaType: e.media_type || '',
          speed: e.speed || '',
          interface: e.remote_interface_name || '',
        };
      }
    }
    return null;
  }

  // Get connected clients for a node (from its link_list, non-uplink entries)
  function getConnectedClients(d) {
    const linkList = d.link_list;
    if (!Array.isArray(linkList) || !linkList.length) return [];
    const entries = linkList[0]?.entry || [];
    const clients = [];
    for (const e of entries) {
      if (e.is_uplink === '0' && e.remote_dev_mesh_uid) {
        const clientDev = byMeshUid[e.remote_dev_mesh_uid];
        if (clientDev && clientDev !== d) {
          // Skip if this client is itself a repeater (handled as child node)
          const isRep = repeaters.includes(clientDev);
          clients.push({
            name: clientDev.friendly_name || clientDev.name || '?',
            ip: clientDev.ip || '',
            isRepeater: isRep,
            online: clientDev.active === '1',
            mediaType: e.media_type || '',
            speed: e.speed || '',
            interface: e.local_interface_name || '',
          });
        }
      }
    }
    return clients;
  }

  // Also get clients connected directly to the master Fritz!Box
  function getMasterClients() {
    // Devices whose parentuid is empty and have uplink to mesh_uid "1" (master)
    // OR devices that have link_list with uplink to master
    const masterClients = [];
    for (const d of list) {
      if (d === master) continue;
      if (repeaters.includes(d)) continue;
      const linkList = d.link_list;
      if (!Array.isArray(linkList) || !linkList.length) continue;
      const entries = linkList[0]?.entry || [];
      const hasMasterUplink = entries.some(e =>
        e.is_uplink === '1' && (e.remote_dev_mesh_uid === '1' || e.remote_dev_mesh_uid === master?.mesh_UIDs)
      );
      if (hasMasterUplink) {
        masterClients.push({
          name: d.friendly_name || d.name || '?',
          ip: d.ip || '',
          online: d.active === '1',
          mediaType: entries.find(e => e.is_uplink === '1')?.media_type || '',
          speed: entries.find(e => e.is_uplink === '1')?.speed || '',
        });
      }
    }
    return masterClients;
  }

  // Build tree structure: master at top, repeaters grouped by uplink
  const repeatersByUplink = {};
  for (const r of repeaters) {
    const uplink = getUplinkInfo(r);
    const parentKey = uplink ? (byMeshUid[r.link_list?.[0]?.entry?.find(e => e.is_uplink === '1')?.remote_dev_mesh_uid]?.UID || 'master') : 'master';
    if (!repeatersByUplink[parentKey]) repeatersByUplink[parentKey] = [];
    repeatersByUplink[parentKey].push(r);
  }

  let clientIdCounter = 0;

  function renderNodeClients(clients) {
    if (!clients.length) return '';
    const nonRepeaterClients = clients.filter(c => !c.isRepeater);
    if (!nonRepeaterClients.length) return '';
    const id = 'clients-' + (clientIdCounter++);
    let html = '<div class="tree-clients-summary" onclick="toggleClients(\'' + id + '\')">';
    html += '▸ ' + nonRepeaterClients.length + ' client' + (nonRepeaterClients.length !== 1 ? 's' : '') + ' connected</div>';
    html += '<div class="tree-clients" id="' + id + '">';
    for (const c of nonRepeaterClients) {
      const dot = c.online ? '<span class="dot on" style="display:inline-block;width:5px;height:5px;"></span>' : '<span class="dot off" style="display:inline-block;width:5px;height:5px;"></span>';
      html += '<div class="tree-client-item">' + dot + ' ' + esc(c.name);
      if (c.ip) html += ' <span style="color:var(--text-dim)">(' + esc(c.ip) + ')</span>';
      html += ' <span style="font-size:9px;color:var(--text-dim)">' + esc(c.mediaType) + (c.speed && c.speed !== '0' ? ' ' + c.speed + ' Mbit/s' : '') + '</span>';
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  function renderRepeaterNode(d) {
    const uplink = getUplinkInfo(d);
    const name = d.friendly_name || d.name || '?';
    const model = d.modelname || '';
    const online = d.active === '1';
    const parsedDev = allDevices.find(ad => ad.uid === d.UID);
    const isMeshed = parsedDev ? parsedDev.isMeshed : checkIsMeshed(d);
    const clients = getConnectedClients(d);
    const childRepeaters = repeatersByUplink[d.UID] || [];

    let html = '<div class="tree-item">';
    html += '<div class="tree-header">';
    html += '<span class="tree-icon"' + (online ? '' : ' style="opacity:0.4"') + '>' + (online ? '📡' : '📴') + '</span>';
    html += '<div style="flex:1">';
    html += '<div class="tree-name">' + (online ? '' : '<span style="opacity:0.5">') + esc(name) + (online ? '' : '</span>');
    if (model) html += ' <span class="tag type">' + esc(model) + '</span>';
    html += isMeshed ? ' <span class="tag mesh">meshed</span>' : ' <span class="tag not-meshed">not meshed</span>';
    html += '</div>';
    if (d.ip) html += '<div class="tree-detail">' + esc(d.ip) + '</div>';
    if (uplink) {
      html += '<div class="tree-link-type">↑ ' + esc(uplink.mediaType) + (uplink.speed && uplink.speed !== '0' ? ' <span class="speed">' + esc(uplink.speed) + ' Mbit/s</span>' : '') + ' via ' + esc(uplink.interface || uplink.name) + '</div>';
    }
    html += '</div></div>';

    html += renderNodeClients(clients);

    if (childRepeaters.length) {
      html += '<div class="tree-children">';
      for (const cr of childRepeaters) {
        html += renderRepeaterNode(cr);
      }
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  // Render full tree
  let html = '<div class="tree-node">';

  // Master node
  html += '<div class="tree-item">';
  html += '<div class="tree-header">';
  html += '<span class="tree-icon">🏠</span>';
  html += '<div style="flex:1">';
  html += '<div class="tree-name">' + esc(master ? (master.friendly_name || master.name || 'Fritz!Box') : 'Fritz!Box') + ' <span class="tag mesh">master</span></div>';
  if (master?.ip) html += '<div class="tree-detail">' + esc(master.ip) + '</div>';
  html += '</div></div>';

  // Master's direct clients
  const masterClients = getMasterClients();
  if (masterClients.length) {
    const id = 'clients-' + (clientIdCounter++);
    html += '<div class="tree-clients-summary" onclick="toggleClients(\'' + id + '\')">';
    html += '▸ ' + masterClients.length + ' direct client' + (masterClients.length !== 1 ? 's' : '') + '</div>';
    html += '<div class="tree-clients" id="' + id + '">';
    for (const c of masterClients) {
      const dot = c.online ? '<span class="dot on" style="display:inline-block;width:5px;height:5px;"></span>' : '<span class="dot off" style="display:inline-block;width:5px;height:5px;"></span>';
      html += '<div class="tree-client-item">' + dot + ' ' + esc(c.name);
      if (c.ip) html += ' <span style="color:var(--text-dim)">(' + esc(c.ip) + ')</span>';
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';

  // Repeaters connected directly to master
  const masterRepeaters = [
    ...(repeatersByUplink['master'] || []),
    ...(master ? (repeatersByUplink[master.UID] || []) : []),
  ];
  // Also include any repeaters not accounted for
  const assignedRepeaters = new Set();
  for (const key of Object.keys(repeatersByUplink)) {
    for (const r of repeatersByUplink[key]) assignedRepeaters.add(r.UID);
  }
  const unassigned = repeaters.filter(r => !assignedRepeaters.has(r.UID));
  const topLevelRepeaters = [...masterRepeaters, ...unassigned];

  if (topLevelRepeaters.length) {
    html += '<div class="tree-children">';
    for (const r of topLevelRepeaters) {
      html += renderRepeaterNode(r);
    }
    html += '</div>';
  }

  // Non-meshed repeaters (offline, never paired)
  const nonMeshedRepeaters = allDevices.filter(d => d.isRepeater && !d.isMeshed && !d.online);
  if (nonMeshedRepeaters.length) {
    html += '<div style="margin-top:12px;padding-top:8px;border-top:1px solid var(--border);">';
    html += '<div style="font-size:11px;color:var(--text-dim);margin-bottom:6px;">⚠ Not meshed / offline (' + nonMeshedRepeaters.length + ')</div>';
    for (const d of nonMeshedRepeaters) {
      html += '<div class="tree-client-item" style="padding:3px 0;"><span class="dot off" style="display:inline-block;width:5px;height:5px;"></span> ' + esc(d.name) + ' <span class="tag not-meshed">not meshed</span></div>';
    }
    html += '</div>';
  }

  html += '</div>';
  el.innerHTML = html;
}

function toggleClients(id) {
  const el = document.getElementById(id);
  if (el) {
    el.classList.toggle('expanded');
    const summary = el.previousElementSibling;
    if (summary) {
      summary.textContent = summary.textContent.replace(/^[▸▾]/, el.classList.contains('expanded') ? '▾' : '▸');
    }
  }
}
</script>
